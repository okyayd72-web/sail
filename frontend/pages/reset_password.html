<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/static/images/favicon.png">
  <title>Reset Password — SAIL</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Lora:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root { --navy:#050d1a; --teal:#00c9a7; --text-1:#f0eee8; --text-2:#8fa0b8; --border:rgba(255,255,255,0.08); --card:rgba(12,24,41,0.9); --ease:cubic-bezier(0.16,1,0.3,1); }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Lora',serif; background:var(--navy); color:var(--text-1); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem 1rem; }
    body::before { content:''; position:fixed; top:0; left:0; right:0; bottom:0; z-index:0; pointer-events:none; background:radial-gradient(ellipse 80% 60% at 80% 80%, rgba(0,201,167,0.07) 0%, transparent 60%); }
    .box { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:2.5rem; width:100%; max-width:400px; position:relative; box-shadow:0 20px 60px rgba(0,0,0,0.5); animation:fadeUp .5s var(--ease) both; z-index:1; }
    .box::before { content:''; position:absolute; top:-1px; left:15%; right:15%; height:2px; background:linear-gradient(90deg,transparent,var(--teal),transparent); }
    .subtitle { text-align:center; color:var(--text-2); font-size:.875rem; margin-bottom:2rem; line-height:1.6; }
    .form-group { margin-bottom:1.1rem; }
    label { display:block; font-family:'Syne',sans-serif; font-size:.7rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--text-2); margin-bottom:.4rem; }
    input { width:100%; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:10px; color:var(--text-1); padding:.75rem 1rem; font-family:'Lora',serif; font-size:.9rem; outline:none; transition:border-color .15s; }
    input:focus { border-color:var(--teal); }
    .btn { width:100%; background:var(--teal); color:var(--navy); border:none; padding:1rem; border-radius:10px; font-family:'Syne',sans-serif; font-weight:700; font-size:1rem; cursor:pointer; margin-top:.5rem; transition:all .25s var(--ease); }
    .btn:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,201,167,0.35); }
    .btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }
    .error-box { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.25); border-radius:8px; padding:.75rem 1rem; font-size:.85rem; color:#f87171; margin-bottom:1rem; display:none; }
    .success-box { background:rgba(34,197,94,0.1); border:1px solid rgba(34,197,94,0.25); border-radius:8px; padding:.75rem 1rem; font-size:.85rem; color:#4ade80; margin-bottom:1rem; display:none; }
    .switch { text-align:center; margin-top:1.25rem; font-size:.85rem; color:var(--text-2); }
    .switch a { color:var(--teal); font-weight:600; text-decoration:none; }
    .invalid-box { text-align:center; padding:1rem 0; }
    .invalid-box p { color:var(--text-2); margin-bottom:1rem; font-size:.9rem; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body>
  <div class="box">
    <img src="/static/images/logo.png" alt="SAIL" style="height:38px; display:block; margin:0 auto .75rem;">

    <div class="error-box"   id="errorBox"></div>
    <div class="success-box" id="successBox"></div>

    <!-- Reset form -->
    <form id="resetForm">
      <p class="subtitle">Enter your new password below.</p>
      <div class="form-group">
        <label>New Password</label>
        <input type="password" id="password" placeholder="At least 8 characters" required minlength="8">
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Repeat your password" required minlength="8">
      </div>
      <button type="submit" class="btn" id="submitBtn">Reset Password →</button>
    </form>

    <p class="switch"><a href="/login">← Back to login</a></p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token  = params.get('token');
    const errorBox   = document.getElementById('errorBox');
    const successBox = document.getElementById('successBox');

    // No token in URL
    if (!token) {
      document.getElementById('resetForm').style.display = 'none';
      errorBox.textContent = 'Invalid reset link. Please request a new one.';
      errorBox.style.display = 'block';
    }

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn      = document.getElementById('submitBtn');
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirmPassword').value;

      errorBox.style.display   = 'none';
      successBox.style.display = 'none';

      if (password !== confirm) {
        errorBox.textContent = 'Passwords do not match.';
        errorBox.style.display = 'block';
        return;
      }

      btn.disabled = true; btn.textContent = 'Resetting…';

      try {
        const res = await fetch('/api/auth/reset-password', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ token, password })
        });
        const data = await res.json();

        if (!res.ok) throw new Error(data.error || 'Reset failed.');

        successBox.textContent = data.message;
        successBox.style.display = 'block';
        document.getElementById('resetForm').style.display = 'none';

        // Redirect to login after 2 seconds
        setTimeout(() => window.location.href = '/login', 2000);

      } catch (error) {
        errorBox.textContent = error.message;
        errorBox.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Reset Password →';
      }
    });
  </script>
</body>
</html>
