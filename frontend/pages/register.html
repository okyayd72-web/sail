<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/static/images/favicon.png">
  <title>Register — SAIL</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Lora:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:#050d1a; --teal:#00c9a7; --gold:#e8b84b;
      --text-1:#f0eee8; --text-2:#8fa0b8;
      --border:rgba(255,255,255,0.08);
      --card:rgba(12,24,41,0.9); --ease:cubic-bezier(0.16,1,0.3,1);
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      font-family:'Lora',serif; background:var(--navy); color:var(--text-1);
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      padding:2rem 1rem;
    }
    body::before {
      content:''; position:fixed; top:0; left:0; right:0; bottom:0; z-index:0; pointer-events:none;
      background:radial-gradient(ellipse 80% 60% at 20% 20%, rgba(0,201,167,0.07) 0%, transparent 60%);
    }
    .box {
      background:var(--card); border:1px solid var(--border); border-radius:20px;
      padding:2.5rem; width:100%; max-width:420px; position:relative;
      box-shadow:0 20px 60px rgba(0,0,0,0.5);
      animation:fadeUp .5s var(--ease) both;
    }
    .box::before {
      content:''; position:absolute; top:-1px; left:15%; right:15%; height:2px;
      background:linear-gradient(90deg,transparent,var(--teal),transparent);
    }
    .logo-wrap { text-align:center; margin-bottom:.4rem; }
    .subtitle { text-align:center; color:var(--text-2); font-size:.875rem; margin-bottom:1.25rem; }

    /* Beta badge */
    .beta-badge {
      display:flex; align-items:center; justify-content:center; gap:.5rem;
      background:rgba(232,184,75,0.08); border:1px solid rgba(232,184,75,0.2);
      border-radius:10px; padding:.6rem 1rem; margin-bottom:1.5rem;
      font-family:'Syne',sans-serif; font-size:.72rem; font-weight:600;
      color:var(--gold);
    }

    .form-group { margin-bottom:1.1rem; }
    label {
      display:block; font-family:'Syne',sans-serif; font-size:.7rem;
      font-weight:700; letter-spacing:.1em; text-transform:uppercase;
      color:var(--text-2); margin-bottom:.4rem;
    }
    input, select {
      width:100%; background:rgba(255,255,255,0.04); border:1px solid var(--border);
      border-radius:10px; color:var(--text-1); padding:.75rem 1rem;
      font-family:'Lora',serif; font-size:.9rem; outline:none;
      transition:border-color .15s;
    }
    input:focus, select:focus { border-color:var(--teal); }
    select option { background:#112236; }

    /* Beta code field highlight */
    #betaCode {
      border-color:rgba(232,184,75,0.3);
      letter-spacing:.15em; font-family:'Syne',sans-serif;
      font-weight:700; text-transform:uppercase;
    }
    #betaCode:focus { border-color:var(--gold); box-shadow:0 0 0 3px rgba(232,184,75,0.1); }

    .row { display:grid; grid-template-columns:1fr 1fr; gap:.75rem; }
    .btn {
      width:100%; background:var(--teal); color:var(--navy); border:none;
      padding:1rem; border-radius:10px; font-family:'Syne',sans-serif;
      font-weight:700; font-size:1rem; cursor:pointer; margin-top:.5rem;
      transition:all .25s var(--ease);
    }
    .btn:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,201,167,0.35); }
    .btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }
    .switch { text-align:center; margin-top:1.25rem; font-size:.85rem; color:var(--text-2); }
    .switch a { color:var(--teal); font-weight:600; }
    .error-box {
      background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.25);
      border-radius:8px; padding:.75rem 1rem; font-size:.85rem; color:#f87171;
      margin-bottom:1rem; display:none;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(20px); }
      to   { opacity:1; transform:translateY(0); }
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo-wrap">
      <img src="/static/images/logo.png" alt="SAIL" style="height:38px;">
    </div>
    <p class="subtitle">Create your free athlete account</p>

    <!-- Beta notice -->
    <div class="beta-badge">
      🎾 Beta Access — Enter your invite code to register
    </div>

    <div class="error-box" id="errorBox"></div>

    <form id="registerForm">
      <!-- Beta code FIRST — most prominent -->
      <div class="form-group">
        <label>Beta Access Code</label>
        <input type="text" id="betaCode" placeholder="Enter your invite code" required autocomplete="off">
      </div>

      <div class="row">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" id="firstName" placeholder="Marcus" required>
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" id="lastName" placeholder="Johnson" required>
        </div>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@email.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Minimum 8 characters" required minlength="8">
      </div>
      <div class="form-group">
        <label>I am a...</label>
        <select id="role">
          <option value="athlete">Student-Athlete</option>
          <option value="parent">Parent / Guardian</option>
          <option value="coach">Coach / Advisor</option>
        </select>
      </div>
      <button type="submit" class="btn" id="submitBtn">Create Free Account →</button>
    </form>
    <p class="switch">Already have an account? <a href="/login">Log in</a></p>
  </div>

  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const err = document.getElementById('errorBox');
      btn.disabled = true;
      btn.textContent = 'Creating account…';
      err.style.display = 'none';

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({
            first_name: document.getElementById('firstName').value,
            last_name:  document.getElementById('lastName').value,
            email:      document.getElementById('email').value,
            password:   document.getElementById('password').value,
            role:       document.getElementById('role').value,
            beta_code:  document.getElementById('betaCode').value.trim().toUpperCase(),
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Registration failed.');
        window.location.href = '/dashboard';
      } catch (error) {
        err.textContent = error.message;
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Create Free Account →';
      }
    });
  </script>
</body>
</html>
